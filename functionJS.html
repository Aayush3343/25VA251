<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
  </head>
  <body>
    <script>
      //
      //
      //uuid
      function demo() {
        console.log("hello JS");
      }
      demo(); // function calling

      // function with parameter
      function demo1(text) {
        console.log("Hello" + text);
      }
      demo1("React");

      // function with parameter
      function add(a, b) {
        var num1 = a;
        var num2 = b;
        var res = num1 + num2;
        console.log("Addition of Two Number is :" + res);
      }

      // synchronous and asynchronous function

      /* function cal() {
        function sub(x, y) {
          console.log("Subtraction is :" + (x - y));
        }

        function add(a, b) {
          console.log("Addition is :" + (a + b));
        }


        function mul(p, q) {
          console.log("Multiplication is : " + p * q);
        }
        mul(9, 6);
        sub(5, 7);
        add(2, 4);
      }
      cal();*/

      // Anonymous function

      let msg = function () {
        console.log("Hello ABES");
      };
      msg();
      //short code for above function is
      let msg1 = () => console.log("Hello React");
      msg1();
      // arrow function with multiple lines
      let msg2 = (age) => {
        if (age >= 18) {
          console.log("Valid Age");
        }
      };
      msg2(23);

      // call back function

      function cal(a, b, callback) {
        var num1 = a;
        console.log("First Number is :" + num1);
        var num2 = b;
        console.log("Second Number is :" + num2);
        var res = num1 + num2;
        callback(res);
      }
      function display(res) {
        console.log("Result is :" + res);
      }
      cal(3, 4, display);

      // callback using setTimout API
      function greeting() {
        document.write("Hello Student");
      }
      function loading() {
        document.write("Data loading...");
      }
      loading();
      setTimeout(greeting, 2000);

      // callback hell

      // javascript promises: JavaScript promises were created to make asynchronous code easier to use.
      //promises Stages
      // pending - operation started (not finished)
      //fullfilled - operation completed
      let promise = new Promise(function (resolve, reject) {
        let myAge = 12;
        if (myAge >= 18) {
          resolve("Valid Age");
        } else {
          reject("Invalid Age");
        }
      });
      promise
        .then((result) => console.log(result))
        .catch((error) => console.log(error));
      //rejected -
      //async and await are modern JavaScript keywords that allow developers to write asynchronous code in a clean, synchronous-like manner
      //fetch API
      async function userData() {
        let userResponse = await fetch("https://dummyjson.com/products");
        let userDataRes = await userResponse.json();
        console.log(userDataRes);
      }
      userData();

      async function productdetail() {
        try {
          let proRes = await fetch("https://dummyjson.com/products/1");
          let prResData = await proRes.json();
          console.log(prResData);
        } catch (error) {
          console.log("Not Valid Data" + error);
        }
      }
      productdetail();
    </script>
  </body>
</html>
