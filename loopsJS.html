<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Object in JS</title>
  </head>

  <body>
    <script>
    // Loops in JavaScript are used to repeatedly execute a block of code until a specific condition is met

    //For loop
    let studentList = ["Aayush","Akki","Rahul","Abhi","Sanjay"];
   // for(let i=0;i<studentList.length;i++){
    //    console.log(studentList[i]);
  //  }
    
    //while loop...
    let i=0;
    while(i < studentList.length){
        console.log(studentList[i]);
        i++;
    }
    // for of loop
    for(let x of studentList){
        console.log(x);
    }
    //for...in loop: Iterates over the enumerable properties (keys) of an object. It can also iterate over array indices as strings but is generally discouraged for arrays due to potential issues with inherited properties and order.
    
    </script>

   

  </body>
</html>
