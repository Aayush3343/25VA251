  <body>

    <script>
        let marks=[23, 34, 45, 56, 67];
        let sum = 0;
        let avg = 0;
        for(let i=0; i<marks.length; i++){
            console.log(marks[i]);
            sum = sum + marks[i];
        }
        avg = sum / marks.length;
        console.log("The sum of marks is: " + sum);
        console.log("The average of marks is: " + avg);

    </script>
